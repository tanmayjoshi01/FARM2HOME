services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: farm2home
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Paras08@2006
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:Paras08@2006@postgres:5432/farm2home
      JWT_SECRET: farm2home_secret
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
